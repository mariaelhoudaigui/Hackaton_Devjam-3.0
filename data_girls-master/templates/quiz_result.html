<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
</head>
<body>
    <h1>Quiz basé sur la transcription</h1>
    <form action="{{ url_for('submit_quiz') }}" method="POST">
        {% for question in questions %}
            <div>
                <p><strong>{{ question.question }}</strong></p>
                {% for choice in question.choices %}
                    <label>
                        <input type="radio" name="question_{{ loop.parent.index0 }}" value="{{ choice }}" required>
                        {{ choice }}
                    </label><br>
                {% endfor %}
            </div>
        {% endfor %}
        <input type="hidden" name="transcription_id" value="{{ transcription.id }}">
        <button type="submit">Soumettre le quiz</button>
    </form>
</body>
</html>
